title: Game

columns:
  main:
    width: 2/3
    sections:
      images:
        type: fields
        fields:
          cover:
            label: Cover Image
            type: files
            query: model.files.template('cover')
            uploads:
              template: cover
          hero:
            label: Hero Image
            type: files
            query: model.files.template('hero')
            uploads:
              template: hero
      content:
        type: fields
        fields:
          title:
            label: Title
            type: text
            required: true
          summary:
            label: Summary
            type: textarea
            size: small
          release_date:
            label: Release Date
            type: date
          developer:
            label: Developer
            type: text
          publisher:
            label: Publisher
            type: text
          genres:
            label: Genres
            type: text
            placeholder: Comma-separated genre names
          platforms:
            label: Platforms
            type: text
            placeholder: Comma-separated platform names

  sidebar:
    width: 1/3
    sections:
      posts:
        label: Posts
        type: pages
        template: post
        layout: cards
        size: small
        info: "{{ page.date }}"
      meta:
        type: fields
        fields:
          rating:
            label: Rating
            type: text
            placeholder: IGDB rating score
          igdb_id:
            label: IGDB ID
            type: text
            disabled: true
          featured:
            label: Featured game
            type: toggle
            text: Show on homepage hero
          videos:
            label: Videos
            type: text
            readonly: true
          websites:
            label: Websites
            type: text
            readonly: true
